<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Clientes</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            margin: 0;
            padding: 0;
        }

        h1 {
            text-align: center;
            color: #333;
        }

        .contenedor {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 20px;
            width: 90%;
            max-width: 600px;
            margin: 30px auto;
        }

        button {
            padding: 12px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background-color: #1976d2;
            color: white;
        }

        table {
            width: 90%;
            margin: 30px auto;
            border-collapse: collapse;
            background-color: white;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: center;
        }

        th {
            background-color: #1976d2;
            color: white;
        }

        .acciones a {
            margin: 0 5px;
            text-decoration: none;
            color: #1976d2;
            font-weight: bold;
        }
    </style>
</head>

<body>

<h1>Gestión de Clientes</h1>

<div class="contenedor">
    <button onclick="window.location.href='/home'">Home</button>
</div>

<h1>Lista de Clientes</h1>

<div style="text-align:center;">
    <a th:href="@{/cliente/nuevo}">Nuevo cliente</a>
</div>

<table>
    <thead>
    <tr>
        <th>DPI</th>
        <th>NOMBRE</th>
        <th>APELLIDO</th>
        <th>DIRECCIÓN</th>
        <th>ESTADO</th>
        <th>ACCIONES</th>
    </tr>
    </thead>

    <tbody>
    <tr th:each="cliente : ${clientes}">
        <td th:text="${cliente.dpiCliente}"></td>
        <td th:text="${cliente.nombreCliente}"></td>
        <td th:text="${cliente.apellidoCliente}"></td>
        <td th:text="${cliente.direccion}"></td>
        <td th:text="${cliente.estado}"></td>

        <td class="acciones">
            <a th:href="@{/cliente/editar/{id}(id=${cliente.dpiCliente})}">Editar</a>
            <a th:href="@{/cliente/eliminar/{id}(id=${cliente.dpiCliente})}">Eliminar</a>
        </td>
    </tr>
    </tbody>
</table>

</body>
</html>
