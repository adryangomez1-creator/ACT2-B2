<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login</title>

    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, sans-serif;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0b1320;
            overflow: hidden;
        }

        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle at top, rgba(25,118,210,0.18), transparent 45%),
                radial-gradient(circle at bottom, rgba(25,118,210,0.10), transparent 50%);
        }

        .login {
            position: relative;
            width: 340px;
            padding: 2rem;
            border-radius: 14px;
            background: rgba(245, 247, 251, 0.97);
            backdrop-filter: blur(10px);
            box-shadow: 0 25px 60px rgba(0,0,0,0.45);
            border: 1px solid rgba(25,118,210,0.25);
        }

        h2 {
            margin: 0 0 1.5rem;
            text-align: center;
            color: #0b1320;
            font-weight: 600;
        }

        .campo {
            margin-bottom: 1rem;
        }

        input {
            width: 100%;
            padding: 0.8rem 0.9rem;
            border-radius: 10px;
            border: 1px solid rgba(11,19,32,0.15);
            outline: none;
            transition: 0.2s;
            background: white;
        }

        input:focus {
            border-color: #1976d2;
            box-shadow: 0 0 0 3px rgba(25,118,210,0.18);
        }

        button {
            width: 100%;
            padding: 0.85rem;
            border: none;
            border-radius: 10px;
            background: #1976d2;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: #125aa0;
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(25,118,210,0.25);
        }
    </style>
</head>

<body>

<div class="login">
    <h2>Iniciar sesión</h2>

    <form th:action="@{/login}" method="post">

        <input type="hidden"
               th:name="${_csrf.parameterName}"
               th:value="${_csrf.token}"/>

        <div class="campo">
            <input type="text"
                   name="username"
                   placeholder="Usuario"
                   required>
        </div>

        <div class="campo">
            <input type="password"
                   name="password"
                   placeholder="Contraseña"
                   required>
        </div>

        <button type="submit">Entrar</button>
    </form>
</div>

</body>
</html>
