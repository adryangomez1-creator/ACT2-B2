<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registro</title>

    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, sans-serif;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0b1320;
        }

        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle at top, rgba(25,118,210,0.18), transparent 45%),
                radial-gradient(circle at bottom, rgba(25,118,210,0.10), transparent 50%);
        }

        .registro {
            position: relative;
            width: 350px;
            padding: 2rem;
            border-radius: 14px;
            background: rgba(245, 247, 251, 0.97);
            backdrop-filter: blur(10px);
            box-shadow: 0 25px 60px rgba(0,0,0,0.45);
            border: 1px solid rgba(25,118,210,0.25);
        }

        h2 {
            margin-bottom: 1.5rem;
            text-align: center;
            color: #0b1320;
        }

        .campo {
            margin-bottom: 1rem;
        }

        input {
            width: 100%;
            padding: 0.8rem;
            border-radius: 10px;
            border: 1px solid rgba(11,19,32,0.15);
            outline: none;
        }

        input:focus {
            border-color: #1976d2;
            box-shadow: 0 0 0 3px rgba(25,118,210,0.18);
        }

        .error {
            color: red;
            font-size: 13px;
            margin-top: 4px;
        }

        button {
            width: 100%;
            padding: 0.85rem;
            border: none;
            border-radius: 10px;
            background: #1976d2;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }

        button:hover {
            background: #125aa0;
        }

        .login-link {
            margin-top: 10px;
            text-align: center;
        }

        .login-link a {
            color: #1976d2;
            text-decoration: none;
        }
    </style>
</head>

<body>

<div class="registro">
    <h2>Registro</h2>

    <form th:action="@{/guardar-usuario}" th:object="${usuario}" method="post">

        <input type="hidden"
               th:name="${_csrf.parameterName}"
               th:value="${_csrf.token}"/>

        <div class="campo">
            <input type="text" th:field="*{username}" placeholder="usuario">
            <div class="error" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
        </div>

        <div class="campo">
            <input type="password" th:field="*{password}" placeholder="Contraseña">
            <div class="error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
        </div>

        <div class="campo">
            <input type="email" th:field="*{email}" placeholder="Correo electrónico">
            <div class="error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
        </div>

        <button type="submit">Registrarse</button>
    </form>
    <div class="login-link">
        <a th:href="@{/login}">¿Ya tienes cuenta? Inicia sesión</a>
    </div>
</div>

</body>
</html>
